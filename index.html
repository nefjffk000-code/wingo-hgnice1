<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>WINGO · PRECISE PATTERN AI + HISTORY</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ff3366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WINGO AI">
  <link rel="apple-touch-icon" href="/favicon.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at 20% 30%, #0a0c18, #03050a);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    /* Fullscreen game iframe */
    .game-iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
      opacity: 0.94;
      pointer-events: auto;
    }

    /* ----- MODERN WIDGET ----- */
    .widget {
      position: fixed;
      z-index: 10000;
      top: clamp(6px,1.5vw,10px);
      right: clamp(6px,1.5vw,10px);
      width: min(340px, calc(100vw - 12px));
      max-height: calc(100dvh - 16px);
      display: flex;
      flex-direction: column;
      background: rgba(14, 12, 26, 0.92);
      backdrop-filter: blur(20px) saturate(180%);
      border-radius: clamp(14px,3vw,22px);
      border: 1.5px solid rgba(200, 130, 50, 0.7);
      transition: border 0.3s ease;
      overflow: hidden;
      will-change: transform;
    }

    /* Header – elegant gradient */
    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: clamp(10px,2vw,14px) clamp(12px,3vw,18px);
      background: linear-gradient(135deg, rgb(32, 20, 8), rgb(22, 16, 6));
      border-bottom: 1.5px solid rgba(200, 130, 50, 0.4);
      cursor: grab;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .widget-header:active { cursor: grabbing; }
    #content {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    #content::-webkit-scrollbar { display: none; }

    .widget-header h3 {
      font-size: clamp(0.68rem,3vw,0.88rem);
      font-weight: 800;
      letter-spacing: 0.3px;
      background: linear-gradient(135deg, #ffe8b0, #ffa040);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .widget-header button {
      background: rgba(10, 8, 20, 0.85);
      border: 1.5px solid rgba(180, 110, 30, 0.5);
      color: #ffe0c0;
      font-size: 18px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .widget-header button:hover {
      background: rgba(30, 20, 5, 0.95);
      border-color: rgba(255, 160, 50, 0.8);
      color: #ffcc70;
      transform: scale(1.05);
    }

    .widget-body {
      padding: clamp(10px,2.5vw,18px);
      overflow: visible;
    }

    /* Login panel */
    .login-area {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .login-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .login-field label {
      font-size: 12px;
      font-weight: 700;
      color: #e8b060;
      letter-spacing: 0.3px;
      padding-left: 4px;
    }
    .phone-prefix {
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(200,150,60,0.35);
      border-right: none;
      border-radius: 10px 0 0 10px;
      padding: 0 10px;
      height: 42px;
      display: flex;
      align-items: center;
      color: rgba(200,180,130,0.55);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      user-select: none;
    }
    .input-wrap.has-prefix input {
      border-radius: 0 10px 10px 0 !important;
      border-left: none !important;
    }
    .login-field .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .login-area input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(8, 8, 20, 0.85);
      border: 1.5px solid rgba(160, 100, 30, 0.45);
      border-radius: 60px;
      color: #f0e0c8;
      text-align: left;
      font-size: 14px;
      font-weight: 400;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
      box-sizing: border-box;
    }
    .login-area input::placeholder {
      color: rgba(200, 170, 120, 0.45);
    }
    .login-area input:focus {
      outline: none;
      border-color: rgba(220, 140, 50, 0.75);
      box-shadow: 0 0 8px rgba(220, 130, 40, 0.15);
    }
    .login-area input[type="password"],
    .login-area input.pw-input {
      padding-right: 46px;
    }
    .eye-toggle {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      color: #c89050;
      font-size: 17px;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .eye-toggle:hover { color: #ffbb60; }
    .login-area .unlock-btn {
      background: linear-gradient(95deg, #e83030, #f07020, #f5a020);
      border: none;
      border-radius: 60px;
      padding: 15px;
      font-weight: 800;
      font-size: 15px;
      color: white;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 6px 20px rgba(220, 60, 20, 0.35);
      transition: 0.2s;
      margin-top: 4px;
    }
    .login-area .unlock-btn:hover {
      transform: scale(0.98);
      box-shadow: 0 4px 14px rgba(220, 60, 20, 0.5);
    }
    .login-area .auth-note {
      font-size: 10px;
      font-weight: 700;
      color: rgba(180, 140, 80, 0.6);
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding-top: 2px;
    }

    /* Tabs – modern pill style */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      background: rgba(0, 0, 0, 0.4);
      padding: 4px;
      border-radius: 80px;
      backdrop-filter: blur(4px);
    }
    .tab {
      flex: 1;
      background: transparent;
      border: none;
      padding: 7px 0;
      border-radius: 60px;
      font-size: clamp(9px,3vw,11px);
      font-weight: 700;
      color: #ccd6ff;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab.active {
      background: linear-gradient(95deg, #ff3366, #ff884d);
      color: white;
      box-shadow: 0 4px 12px rgba(255, 51, 102, 0.4);
    }

    /* Cards & panels */
    .panel {
      display: none;
      animation: fadeUp 0.25s ease;
    }
    .panel.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Info card (period & timer) */
    .info-card {
      background: rgba(8, 12, 22, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 80px;
      padding: clamp(7px,1.8vw,10px) clamp(10px,3vw,16px);
      margin-bottom: clamp(8px,2vw,14px);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border: 1px solid rgba(255, 180, 100, 0.5);
    }
    .future-period-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .future-period-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1px;
      color: rgba(255,200,140,0.5);
      text-transform: uppercase;
    }
    .future-period {
      font-family: 'Fira Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: #ffddb0;
      letter-spacing: 0.5px;
      word-break: break-all;
    }
    .timer-value {
      font-family: 'Fira Mono', monospace;
      font-size: clamp(18px,5vw,26px);
      font-weight: 800;
      background: linear-gradient(135deg, #ffe6c0, #ffaa66);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }


    /* Prediction area – glassy and vibrant */
    .prediction-area {
      text-align: center;
      background: rgba(5, 8, 18, 0.7);
      backdrop-filter: blur(16px);
      border-radius: clamp(16px,4vw,32px);
      padding: clamp(10px,2.5vw,18px) clamp(8px,2vw,14px);
      margin: clamp(8px,2vw,14px) 0;
      border: 1px solid rgba(255, 200, 130, 0.5);
    }
    .prediction-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .prediction-dot {
      width: clamp(18px,4.5vw,28px);
      height: clamp(18px,4.5vw,28px);
      border-radius: 50%;
    }
    .green-dot { background: #22c55e; box-shadow: 0 0 2px #22c55e; }
    .red-dot { background: #ef4444; box-shadow: 0 0 2px #ef4444; }
    .purple-dot { background: #c084fc; box-shadow: 0 0 2px #c084fc; }

    .dual-dot-container { display: flex; gap: 4px; }
    .dual-dot { width: clamp(18px,4.5vw,28px); height: clamp(18px,4.5vw,28px); border-radius: 50%; }

    .prediction-big-small {
      font-size: clamp(20px,6vw,36px);
      font-weight: 900;
      letter-spacing: 1px;
    }
    .big-result { color: #ffcc44; text-shadow: 0 0 2px #ffaa33; }
    .small-result { color: #44ffff; text-shadow: 0 0 2px #22ddff; }

    .prediction-number {
      font-size: clamp(20px,6vw,36px);
      font-weight: 800;
      font-family: monospace;
    }
    .num-green { color: #86efac; }
    .num-red { color: #f87171; }
    .num-purple { color: #d8b4fe; }

    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: space-around;
      background: rgba(8, 12, 22, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 700;
      color: #eef3ff;
      margin-top: 6px;
    }
    .stats-bar b {
      color: #ffcc77;
      font-size: 13px;
      margin-left: 4px;
    }

    /* Tables – clean, no scrollbars */
    .live-table-wrap, .history-table-wrap {
      max-height: 240px;
      overflow-y: auto;
      border-radius: 18px;
      background: rgba(8, 11, 20, 0.6);
      backdrop-filter: blur(8px);
      margin-top: 4px;
      border: 1px solid rgba(255, 180, 120, 0.3);
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .live-table-wrap::-webkit-scrollbar,
    .history-table-wrap::-webkit-scrollbar {
      display: none;
    }
    .live-table, .history-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 12px;
    }
    /* Live: PERIOD | NUMBER | RESULT | PATTERN */
    .live-table th:nth-child(1), .live-table td:nth-child(1) { width:46%; text-align:left; padding-left:10px; }
    .live-table th:nth-child(2), .live-table td:nth-child(2) { width:14%; text-align:center; }
    .live-table th:nth-child(3), .live-table td:nth-child(3) { width:22%; text-align:center; }
    .live-table th:nth-child(4), .live-table td:nth-child(4) { width:18%; text-align:center; }
    /* History: PERIOD | PREDICTED | NUMBER | MATCH */
    .history-table th:nth-child(1), .history-table td:nth-child(1) { width:46%; text-align:left; padding-left:10px; }
    .history-table th:nth-child(2), .history-table td:nth-child(2) { width:22%; text-align:center; }
    .history-table th:nth-child(3), .history-table td:nth-child(3) { width:16%; text-align:center; }
    .history-table th:nth-child(4), .history-table td:nth-child(4) { width:16%; text-align:center; }
    .live-table th, .history-table th {
      padding: 8px 6px;
      color: #ffbc6e;
      background: rgb(8, 11, 20);
      position: sticky;
      top: 0;
      z-index: 2;
      font-weight: 600;
      letter-spacing: 0.4px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .live-table td, .history-table td {
      padding: 7px 6px;
      border-bottom: 1px solid rgba(255,200,150,0.12);
      color: #f0f3fc;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      vertical-align: middle;
    }
    .dot-wrapper { display: inline-flex; gap: 6px; align-items: center; }
    .dot { width: 12px; height: 12px; border-radius: 12px; }

    .info-note {
      font-size: 11px;
      color: #cdd9ff;
      background: rgba(0, 0, 0, 0.4);
      padding: 8px 16px;
      border-radius: 40px;
      margin: 12px 8px;
      text-align: center;
    }
  
    /* ── RESPONSIVE: mobile phones (< 480px) ── */
    @media (max-width: 480px) {
      .widget {
        top: 6px;
        right: 6px;
        width: min(270px, calc(100vw - 16px));
        max-height: 62dvh;
        border-radius: 14px;
      }
      .widget-header {
        padding: 7px 11px;
      }
      .widget-header h3 {
        font-size: 0.72rem;
      }
      .widget-header h3 img {
        height: 1.7em !important;
        margin-right: 5px !important;
      }
      .widget-header button {
        width: 24px;
        height: 24px;
        font-size: 15px;
      }
      .widget-body { padding: 8px 9px; }
      .login-area { gap: 8px; }
      .login-field { gap: 4px; }
      .login-field label { font-size: 10px; }
      .login-area input { padding: 9px 12px; font-size: 12px; }
      .login-area input[type="password"], .login-area input.pw-input { padding-right: 38px; }
      .phone-prefix { height: 35px; padding: 0 8px; font-size: 12px; }
      .eye-toggle { font-size: 14px; right: 10px; }
      .login-area .unlock-btn { padding: 11px; font-size: 13px; margin-top: 2px; }
      .login-area .auth-note { font-size: 9px; letter-spacing: 1.5px; }
      .tabs { gap: 3px; padding: 3px; margin-bottom: 8px; }
      .tab { padding: 5px 0; font-size: 9px; }
      .info-card { padding: 5px 10px; margin-bottom: 7px; }
      .future-period { font-size: 11px; }
      .timer-value { font-size: 18px; }
      .prediction-area { padding: 8px 7px; margin: 7px 0; }
      .prediction-big-small { font-size: 22px; }
      .prediction-number { font-size: 22px; }
      .prediction-dot, .dual-dot { width: 16px !important; height: 16px !important; }
      .prediction-row { gap: 7px; }
      .stats-bar { font-size: 10px; padding: 6px 8px; }
      .stats-bar b { font-size: 11px; }
      .live-table-wrap, .history-table-wrap { max-height: 160px; }
      .live-table, .history-table { font-size: 10px; }
      .live-table th, .history-table th { padding: 6px 4px; }
      .live-table td, .history-table td { padding: 5px 4px; }
      .dot { width: 9px; height: 9px; }
      .info-note { font-size: 10px; padding: 6px 10px; margin: 7px 4px; }
    }
    /* ── RESPONSIVE: very small phones (< 360px) ── */
    @media (max-width: 360px) {
      .widget { top: 3px; right: 3px; width: calc(100vw - 14px); }
      .tabs { gap: 2px; padding: 2px; }
      .tab { padding: 5px 0; font-size: 8px; }
      .prediction-row { gap: 5px; }
      .widget-body { padding: 7px; }
    }
    /* ── RESPONSIVE: landscape phones ── */
    @media (max-height: 500px) {
      .widget { max-height: calc(100dvh - 8px); top: 4px; }
      .prediction-area { padding: 7px 8px; margin: 5px 0; }
      .info-card { margin-bottom: 6px; padding: 5px 10px; }
      .live-table-wrap, .history-table-wrap { max-height: 160px; }
    }
    /* ── RESPONSIVE: tablets & desktops ── */
    @media (min-width: 768px) {
      .widget { top: 14px; right: 14px; width: min(340px, calc(100vw - 28px)); }
    }
    /* ── RESPONSIVE: large screens (1440px+) ── */
    @media (min-width: 1440px) {
      .widget { top: 20px; right: 20px; width: 340px; }
    }

  </style>
</head>
<body>

<div id="splashScreen" style="
  position:fixed;inset:0;z-index:99999;
  background:radial-gradient(ellipse at 50% 40%, #1a0e04 0%, #0a0814 60%, #03050a 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transition:opacity 0.6s ease;
">
  <div id="splashRing" style="
    position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center;
    margin-bottom:28px;
  ">
    <div style="
      position:absolute;inset:0;border-radius:50%;
      border:2.5px solid transparent;
      background:linear-gradient(135deg,#ffd060,#ff8020,#ffd060) border-box;
      -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
      -webkit-mask-composite:destination-out;mask-composite:exclude;
      animation:spinRing 2.4s linear infinite;
    "></div>
    <div style="
      position:absolute;inset:8px;border-radius:50%;
      background:radial-gradient(circle,#1e1208 60%,#110a04);
      box-shadow:0 0 40px rgba(200,120,20,0.3),inset 0 0 20px rgba(0,0,0,0.5);
    "></div>
    <img src="/crown.png" id="splashCrown" style="
      width:110px;height:110px;object-fit:contain;position:relative;z-index:1;
      filter:sepia(1) saturate(6) hue-rotate(5deg) brightness(1.2);
      animation:crownPulse 1.8s ease-in-out infinite;
    " alt="crown">
  </div>
  <div style="
    font-family:'Inter',system-ui,sans-serif;font-size:22px;font-weight:900;
    background:linear-gradient(135deg,#ffe8a0,#ffb040,#ffe8a0);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    letter-spacing:1.5px;margin-bottom:6px;animation:fadeInUp 0.6s ease 0.3s both;
  ">WINGO · HGNICE</div>
  <div style="
    font-family:'Inter',system-ui,sans-serif;font-size:11px;font-weight:700;
    color:rgba(200,160,80,0.55);letter-spacing:3px;text-transform:uppercase;
    animation:fadeInUp 0.6s ease 0.5s both;
  ">Precise Pattern AI</div>
  <div id="splashDots" style="
    display:flex;gap:8px;margin-top:36px;
    animation:fadeInUp 0.6s ease 0.7s both;
  ">
    <span style="width:7px;height:7px;border-radius:50%;background:#c88030;animation:dotBounce 1s ease-in-out 0s infinite;display:block;"></span>
    <span style="width:7px;height:7px;border-radius:50%;background:#c88030;animation:dotBounce 1s ease-in-out 0.2s infinite;display:block;"></span>
    <span style="width:7px;height:7px;border-radius:50%;background:#c88030;animation:dotBounce 1s ease-in-out 0.4s infinite;display:block;"></span>
  </div>
</div>
<style>
@keyframes spinRing { to { transform:rotate(360deg); } }
@keyframes crownPulse {
  0%,100% { transform:scale(1) translateY(0); filter:sepia(1) saturate(6) hue-rotate(5deg) brightness(1.2); }
  50% { transform:scale(1.08) translateY(-5px); filter:sepia(1) saturate(8) hue-rotate(5deg) brightness(1.5) drop-shadow(0 0 14px #ffaa30); }
}
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(14px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes dotBounce {
  0%,100% { transform:translateY(0); opacity:0.4; }
  50% { transform:translateY(-7px); opacity:1; }
}
</style>
<script>
function _dismissSplash() {
  var s = document.getElementById('splashScreen');
  if (s) { s.style.opacity = '0'; setTimeout(function(){ if(s.parentNode) s.remove(); }, 650); }
}
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(_dismissSplash, 2200);
});
setTimeout(_dismissSplash, 5000);
</script>

<script>
(function(){
  // Safe DOM helpers — never throw on missing elements
  function domSet(id, prop, val) { const e = document.getElementById(id); if (e) e[prop] = val; }
  function domStyle(id, prop, val) { const e = document.getElementById(id); if (e) e.style[prop] = val; }


  let liveHistory = [];
  let predictionHistory = [];
  let roundSyncActive = false;
  let currentPrediction = null;
  let currentPredictedNumber = null;
  let currentTrendFamily = null;       // active PRNG trend family name from server
  let animationFrame = null;
  let lastPatternName = "pattern detection";
  let lastConfidence = 0.7;
  let lastTriggeredSecond = -1;
  let pendingPredictionRegen = false;  // deferred prediction update — fires at timer=0
  let lastTrendName = '';
  let lastTrendDir = '';
  let lastStreakLen = 0;
  let lastAlert = '';
  let lastMomentum = 'neutral';
  let lastPatternType = '';
  let prngCycleCache = { count: -1, result: null };
  let predGeneratedAt = 0;   // timestamp when current prediction was last generated

  // ── High-performance drag — RAF-batched, GPU-composited, iframe-safe ──────
  const widget = document.getElementById('widget');
  const dragHandle = document.getElementById('dragHandle');
  const gameIframe = document.querySelector('.game-iframe');
  let dragActive = false;
  let startX = 0, startY = 0, baseX = 0, baseY = 0;
  let pendingX = 0, pendingY = 0;
  let rafId = null;

  // Commit the position on the GPU-composited layer, once per frame
  function commitPos() {
    rafId = null;
    widget.style.transform = `translate3d(${pendingX}px,${pendingY}px,0)`;
  }

  dragHandle.addEventListener('pointerdown', (e) => {
    if (e.target.closest('button')) return;
    dragActive = true;
    startX = e.clientX - baseX;
    startY = e.clientY - baseY;
    dragHandle.setPointerCapture(e.pointerId);
    widget.style.transition = 'none';
    // Block the iframe from stealing pointer events during drag
    if (gameIframe) gameIframe.style.pointerEvents = 'none';
    e.preventDefault();
  }, { passive: false });

  dragHandle.addEventListener('pointermove', (e) => {
    if (!dragActive) return;
    pendingX = e.clientX - startX;
    pendingY = e.clientY - startY;
    // Schedule one DOM write per animation frame — zero-lag, no thrash
    if (!rafId) rafId = requestAnimationFrame(commitPos);
  }, { passive: true });

  function endDrag() {
    if (!dragActive) return;
    dragActive = false;
    baseX = pendingX;
    baseY = pendingY;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    widget.style.transition = 'border 0.3s ease';
    // Re-enable iframe interaction
    if (gameIframe) gameIframe.style.pointerEvents = 'auto';
  }

  dragHandle.addEventListener('pointerup', endDrag);
  dragHandle.addEventListener('pointercancel', endDrag);
  document.addEventListener('pointerup', endDrag);
  document.addEventListener('pointercancel', endDrag);

  function getResultFromNumber(num) { return (num >= 5 && num <= 9) ? 'BIG' : 'SMALL'; }
  function getDotHtml(num) {
    const n = parseInt(num);
    let dots = [];
    if (n === 5) dots = ['green-dot', 'purple-dot'];
    else if (n === 0) dots = ['red-dot', 'purple-dot'];
    else if ([1,3,7,9].includes(n)) dots = ['green-dot'];
    else if ([2,4,6,8].includes(n)) dots = ['red-dot'];
    if (dots.length === 0) return '<span class="dot" style="background:#aaa;"></span>';
    return `<div class="dot-wrapper">${dots.map(d => `<span class="dot ${d}"></span>`).join('')}</div>`;
  }
  function getNumberClass(num) {
    const n = parseInt(num);
    if ([1,3,7,9].includes(n)) return 'num-green';
    if ([2,4,6,8].includes(n)) return 'num-red';
    if (n === 5 || n === 0) return 'num-purple';
    return '';
  }
  function getNumberDisplayData(num) {
    if ([1,3,7,9].includes(num)) return { dotClass: "green-dot", dual: false, textClass: "num-green" };
    if ([2,4,6,8].includes(num)) return { dotClass: "red-dot", dual: false, textClass: "num-red" };
    if (num === 5) return { dotClass: "green-dot purple-dot", dual: true, textClass: "num-purple" };
    if (num === 0) return { dotClass: "red-dot purple-dot", dual: true, textClass: "num-purple" };
    return { dotClass: "", dual: false, textClass: "" };
  }

  function loadLiveHistory() {
    const saved = localStorage.getItem('wingo_pattern_v5');
    if (saved) try { liveHistory = JSON.parse(saved); } catch(e) { liveHistory = []; }
    const savedPred = localStorage.getItem('wingo_pred_history_v5');
    if (savedPred) try { predictionHistory = JSON.parse(savedPred); } catch(e) { predictionHistory = []; }
    renderLiveTable();
    renderHistoryTable();
    updateHistoryStats();
    if (liveHistory.length > 0) { generateStablePrediction(); updateUIWithCurrentPrediction(); }
    else updateUIDefault();
  }
  // Debounced localStorage saves — batch rapid calls into one write per second
  let _saveLiveTimer = null;
  function saveLiveHistory() {
    if (_saveLiveTimer) return;
    _saveLiveTimer = setTimeout(() => {
      _saveLiveTimer = null;
      try { localStorage.setItem('wingo_pattern_v5', JSON.stringify(liveHistory.slice(0, 1000))); } catch(e) {}
    }, 1000);
  }
  let _savePredTimer = null;
  function savePredictionHistory() {
    updateHistoryStats();
    if (_savePredTimer) return;
    _savePredTimer = setTimeout(() => {
      _savePredTimer = null;
      try { localStorage.setItem('wingo_pred_history_v5', JSON.stringify(predictionHistory.slice(0, 1000))); } catch(e) {}
    }, 1000);
  }

  // ── Server-side prediction history sync ───────────────────────────────────
  let _pendingServerSave = [];
  let _serverSaveTimer   = null;
  function flushPredictionsToServer() {
    if (_serverSaveTimer || _pendingServerSave.length === 0) return;
    _serverSaveTimer = setTimeout(async () => {
      const toSend = _pendingServerSave.splice(0);
      _serverSaveTimer = null;
      try {
        await fetch('/api/predictions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ entries: toSend })
        });
      } catch(e) {
        // push back on failure so they retry next round
        _pendingServerSave.unshift(...toSend);
      }
    }, 1500);
  }

  function addPredictionRecord(entry) {
    if (predictionHistory.find(p => p.period === entry.period)) return;
    predictionHistory.unshift(entry);
    savePredictionHistory();
    renderHistoryTable();
    _pendingServerSave.push(entry);
    flushPredictionsToServer();
  }

  async function loadPredHistoryFromServer() {
    try {
      const data = await fetch('/api/predictions').then(r => r.json());
      if (!data.success || !Array.isArray(data.history)) return;
      const existingSet = new Set(predictionHistory.map(p => p.period));
      let added = 0;
      for (const entry of data.history) {
        if (entry.period && !existingSet.has(entry.period)) {
          predictionHistory.push(entry);
          existingSet.add(entry.period);
          added++;
        }
      }
      if (added > 0) {
        predictionHistory.sort((a, b) => String(b.period).localeCompare(String(a.period)));
        savePredictionHistory();
        renderHistoryTable();
        updateHistoryStats();
      }
    } catch(e) {}
  }
  function renderLiveTable() {
    const tbody = document.getElementById('liveTableBody');
    if (!liveHistory.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:36px;">✨ Waiting for first sync...✨</td></tr>';
      domSet('liveTotalCount','innerText','0');
      return;
    }
    let html = '';
    liveHistory.forEach(row => {
      const numVal = row.number;
      const numberClass = getNumberClass(numVal);
      const dotMarkup = getDotHtml(numVal);
      const resultClass = (row.result === 'BIG') ? 'big-result' : 'small-result';
      html += `<tr>
        <td style="font-family:monospace; font-size:10px;" title="${row.period}">${row.period}</td>
        <td class="${numberClass}"><strong>${numVal}</strong></td>
        <td class="${resultClass}" style="font-weight:700;">${row.result}</td>
        <td class="dot-cell">${dotMarkup}</td>
      </tr>`;
    });
    tbody.innerHTML = html;
    domSet('liveTotalCount','innerText',liveHistory.length);
  }
  function renderHistoryTable() {
    const tbody = document.getElementById('historyTableBody');
    if (!predictionHistory.length) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:40px 16px;">
        <div style="font-size:28px;margin-bottom:10px;">⏳</div>
        <div style="color:#ffcc77;font-weight:700;font-size:13px;letter-spacing:0.5px;margin-bottom:6px;">Waiting for prediction…</div>
        <div style="color:rgba(255,255,255,0.35);font-size:11px;line-height:1.6;">Your results will appear here<br>after the next round completes.</div>
      </td></tr>`;
      return;
    }
    let html = '';
    predictionHistory.slice(0, 50).forEach(p => {
      const correctMark = p.correct ? '✅' : '❌';
      html += `<tr>
        <td style="font-family:monospace; font-size:10px;" title="${p.period}">${p.period}</td>
        <td class="${p.predictedResult === 'BIG' ? 'big-result' : 'small-result'}">${p.predictedResult}</td>
        <td class="${getNumberClass(p.predictedNumber)}"><strong>${p.predictedNumber}</strong></td>
        <td class="match-cell">${correctMark}</td>
      </tr>`;
    });
    tbody.innerHTML = html;
  }
  function updateHistoryStats() {
    const total = predictionHistory.length;
    const correct = predictionHistory.filter(p => p.correct === true).length;
    const losses = total - correct;
    const wEl = document.getElementById('historyWins');
    const lEl = document.getElementById('historyLosses');
    if (wEl) wEl.textContent = `✓ ${correct}`;
    if (lEl) lEl.textContent = `✗ ${losses}`;
  }
  function getNextPeriod() {
    // Prefer the authoritative server value whenever available
    if (gameStatePeriod && gameStatePeriod.length > 4) return gameStatePeriod;
    if (liveHistory.length === 0) return "----";
    // Fallback: liveHistory = completed rounds; max+1 = current running round
    let maxPeriod = liveHistory[0].period, maxNum = -1;
    for (let h of liveHistory) {
      let m = h.period.match(/\d+$/);
      if (m) { let n = parseInt(m[0], 10); if (n > maxNum) { maxNum = n; maxPeriod = h.period; } }
    }
    const match = maxPeriod.match(/\d+$/);
    if (match) {
      let numStr = match[0], num = parseInt(numStr, 10), nextNum = num + 1, nextNumStr = nextNum.toString();
      while (nextNumStr.length < numStr.length) nextNumStr = "0" + nextNumStr;
      return maxPeriod.slice(0, maxPeriod.length - numStr.length) + nextNumStr;
    }
    return maxPeriod + "+1";
  }
  function convertToAB(history) { return history.map(h => h.result === 'SMALL' ? 'A' : 'B'); }

  // =====================================================
  // PATTERN LIBRARY — A = SMALL, B = BIG
  // =====================================================
  const CYCLE_PATTERNS = [
    { id:'1A1B',   name:'Single Alternating (S→B)',    cycle:['A','B'],                                    weight:0.82 },
    { id:'2A2B',   name:'Two-in-One (SS→BB)',           cycle:['A','A','B','B'],                            weight:0.83 },
    { id:'3A3B',   name:'Three-in-One (SSS→BBB)',       cycle:['A','A','A','B','B','B'],                    weight:0.82 },
    { id:'4A4B',   name:'Quadra Cycle (SSSS→BBBB)',     cycle:['A','A','A','A','B','B','B','B'],            weight:0.81 },
    { id:'5A5B',   name:'Five-Streak Cycle',            cycle:['A','A','A','A','A','B','B','B','B','B'],    weight:0.80 },
    { id:'1A2B',   name:'1S+2B',                        cycle:['A','B','B'],                                weight:0.74 },
    { id:'2A1B',   name:'2S+1B',                        cycle:['A','A','B'],                                weight:0.74 },
    { id:'1A3B',   name:'1S+3B',                        cycle:['A','B','B','B'],                            weight:0.73 },
    { id:'3A1B',   name:'3S+1B',                        cycle:['A','A','A','B'],                            weight:0.74 },
    { id:'3A2B',   name:'3S+2B',                        cycle:['A','A','A','B','B'],                        weight:0.75 },
    { id:'4A1B',   name:'4S+1B',                        cycle:['A','A','A','A','B'],                        weight:0.74 },
    { id:'4A2B',   name:'4S+2B',                        cycle:['A','A','A','A','B','B'],                    weight:0.75 },
    { id:'4A3B',   name:'4S+3B',                        cycle:['A','A','A','A','B','B','B'],                weight:0.75 },
    { id:'1B1A',   name:'Single Alternating (B→S)',     cycle:['B','A'],                                    weight:0.82 },
    { id:'2B2A',   name:'Two-in-One (BB→SS)',           cycle:['B','B','A','A'],                            weight:0.83 },
    { id:'3B3A',   name:'Three-in-One (BBB→SSS)',       cycle:['B','B','B','A','A','A'],                    weight:0.82 },
    { id:'4B4A',   name:'Quadra Cycle (BBBB→SSSS)',     cycle:['B','B','B','B','A','A','A','A'],            weight:0.81 },
    { id:'5B5A',   name:'Five-Streak Mirror Cycle',     cycle:['B','B','B','B','B','A','A','A','A','A'],    weight:0.80 },
    { id:'1B2A',   name:'1B+2S',                        cycle:['B','A','A'],                                weight:0.74 },
    { id:'2B1A',   name:'2B+1S',                        cycle:['B','B','A'],                                weight:0.74 },
    { id:'1B3A',   name:'1B+3S',                        cycle:['B','A','A','A'],                            weight:0.73 },
    { id:'3B1A',   name:'3B+1S',                        cycle:['B','B','B','A'],                            weight:0.74 },
    { id:'3B2A',   name:'3B+2S',                        cycle:['B','B','B','A','A'],                        weight:0.75 },
    { id:'4B1A',   name:'4B+1S',                        cycle:['B','B','B','B','A'],                        weight:0.74 },
    { id:'chain_bs', name:'Cycle Chain (BB→BBB)',       cycle:['B','B','A','A','A'],                        weight:0.73 },
    { id:'chain_sb', name:'Cycle Chain (SS→SSS)',       cycle:['A','A','B','B','B'],                        weight:0.73 },
    { id:'comp2r',   name:'Compression 2+2 (BB→SS)',   cycle:['B','B','A','A'],                            weight:0.78 },
    { id:'comp3r',   name:'Compression 3+3 (BBB→SSS)', cycle:['B','B','B','A','A','A'],                    weight:0.78 },
  ];

  // =====================================================
  // ADAPTIVE CONFIDENCE by streak length
  // Short(1-3) → Medium(4-7) → Long(8-12) → Extreme(13+)
  // =====================================================
  function getAdaptiveStreakConf(len) {
    if (len >= 14) return 0.96;
    if (len >= 13) return 0.95;
    if (len >= 10) return 0.93;
    if (len >= 8)  return 0.91;
    if (len >= 7)  return 0.89;
    if (len >= 6)  return 0.86;
    if (len >= 5)  return 0.83;
    if (len >= 4)  return 0.79;
    if (len >= 3)  return 0.73;
    return 0.68;
  }

  function getStreakLabel(len) {
    if (len === 1) return 'Single';
    if (len === 2) return 'Double';
    if (len === 3) return 'Triple';
    if (len === 4) return 'Quadra';
    if (len === 5) return 'Five Streak';
    if (len === 6) return 'Six Streak';
    if (len === 7) return 'Seven Streak';
    if (len >= 13) return 'Extreme Streak';
    if (len >= 8)  return 'Long Streak';
    return `${len}-Streak`;
  }

  // =====================================================
  // WEIGHTED PROBABILITY — mean reversion on imbalance
  // =====================================================
  function getWeightedHistoryBias(seq) {
    if (seq.length < 10) return { pred: null, weight: 0 };
    const recent20 = seq.slice(0, Math.min(seq.length, 20));
    const aCount = recent20.filter(v => v === 'A').length;
    const bCount = recent20.length - aCount;
    const ratio = Math.max(aCount, bCount) / recent20.length;
    if (ratio >= 0.70) {
      const dominant = aCount > bCount ? 'A' : 'B';
      return { pred: dominant === 'A' ? 'B' : 'A', weight: (ratio - 0.5) * 2.0 };
    }
    return { pred: null, weight: 0 };
  }

  // =====================================================
  // COMPRESSION DETECTOR — uniform alternating run lengths
  // e.g. BBSSBB = runs [2,2,2] → compression rhythm
  // =====================================================
  function detectCompression(runs) {
    if (runs.length < 4) return null;
    const r4 = runs.slice(0, 4);
    const lens = r4.map(r => r.len);
    const avg = lens.reduce((a, b) => a + b, 0) / lens.length;
    if (!lens.every(l => Math.abs(l - avg) <= 1) || avg < 1.5) return null;
    const alternating = r4.every((r, i) => i === 0 || r.val !== r4[i - 1].val);
    if (!alternating) return null;
    const cur = runs[0];
    const avgR = Math.round(avg);
    if (cur.len < avgR) {
      return { name: `Compression ${avgR}+${avgR} (in-cluster)`, prediction: cur.val, confidence: 0.76, trending: `Cluster of ${avgR} in progress — continue`, type: 'COMPRESSION' };
    }
    return { name: `Compression → Expansion Switch`, prediction: cur.val === 'A' ? 'B' : 'A', confidence: 0.78, trending: `${avgR}-block complete — switch sides`, type: 'COMPRESSION_SWITCH' };
  }

  // =====================================================
  // EXPANSION DETECTOR — pure B→S→B→S alternation
  // =====================================================
  function detectExpansion(runs) {
    if (runs.length < 5) return null;
    const r5 = runs.slice(0, 5);
    if (r5.every(r => r.len === 1) && r5.every((r, i) => i === 0 || r.val !== r5[i - 1].val)) {
      return { name: 'Expansion (B→S→B→S)', prediction: runs[0].val === 'A' ? 'B' : 'A', confidence: 0.81, trending: 'Strict alternation — Expansion pattern, next flip', type: 'EXPANSION' };
    }
    return null;
  }

  // =====================================================
  // CYCLE CHAIN — escalating or descending run lengths
  // e.g. BB→BBB = cycle chain (Double → Triple → Reversal)
  // =====================================================
  function detectCycleChain(runs) {
    if (runs.length < 3) return null;
    const [r0, r1, r2] = runs;
    if (r0.val !== r1.val && r1.val !== r2.val) {
      // Escalating chain: lengths grow
      if (r2.len <= r1.len && r1.len <= r0.len) {
        const opp = r0.val === 'A' ? 'B' : 'A';
        return { name: `Cycle Chain (${r2.len}→${r1.len}→${r0.len})`, prediction: opp, confidence: 0.75, trending: `Escalating blocks — reversal expected`, type: 'CHAIN' };
      }
      // Mirror Opposite: descending after long streak

  // Match recent sequence against a repeating cycle.
  function matchCycle(seq, cycle) {
    const cLen = cycle.length;
    if (seq.length < Math.max(cLen, 3)) return { match: false };
    const checkLen = Math.min(seq.length, cLen * 3);
    let bestScore = 0, bestNextPred = null;
    for (let curPhase = 0; curPhase < cLen; curPhase++) {
      let matches = 0;
      for (let i = 0; i < checkLen; i++) {
        const phase = ((curPhase - i) % cLen + cLen) % cLen;
        if (seq[i] === cycle[phase]) matches++;
      }
      const score = matches / checkLen;
      if (score > bestScore) {
        bestScore = score;
        bestNextPred = cycle[(curPhase + 1) % cLen];
      }
    }
    if (bestScore < 0.75) return { match: false };
    return { match: true, score: bestScore, nextPred: bestNextPred };
  }

  // Run-length encode sequence (most-recent first)
  function runLengthEncode(seq) {
    if (!seq.length) return [];
    const runs = [];
    let cur = seq[0], count = 1;
    for (let i = 1; i < seq.length; i++) {
      if (seq[i] === cur) count++;
      else { runs.push({ val: cur, len: count }); cur = seq[i]; count = 1; }
    }
    runs.push({ val: cur, len: count });
    return runs;
  }

  function predictNumberMatchingResult(history, targetResult) {
    const candidates = targetResult === 'BIG' ? [5,6,7,8,9] : [0,1,2,3,4];
    if (history.length < 3) {
      const seed = parseInt(String(history[0]?.period || Date.now()).slice(-4), 10);
      return { number: candidates[seed % candidates.length], conf: 0.52 };
    }

    // 1. Gap analysis — rounds since each candidate last appeared
    const gapOf = {};
    for (const n of candidates) gapOf[n] = 999;
    for (let i = 0; i < Math.min(history.length, 300); i++) {
      const n = history[i].number;
      if (candidates.includes(n) && gapOf[n] === 999) gapOf[n] = i + 1;
    }
    const maxGap = Math.max(...candidates.map(n => gapOf[n]));

    // 2. Cold-frequency in last 60 rounds (inverse = less seen = more due)
    const freq = {};
    for (const n of candidates) freq[n] = 0;
    for (const h of history.slice(0, Math.min(history.length, 60))) {
      if (candidates.includes(h.number)) freq[h.number]++;
    }
    const maxFreq = Math.max(...candidates.map(n => freq[n])) || 1;

    // 3. Parity trend — which parity is overdue in the last 12 rounds?
    const parities = history.slice(0, 12).map(h => h.number % 2);
    const evenRecent = parities.filter(p => p === 0).length;
    const oddRecent  = parities.length - evenRecent;
    const favorEven  = oddRecent > evenRecent; // more odd lately → even overdue

    // 4. Number-level alternation: if this exact number appeared in last 1-2 rounds, penalize it
    const recent2 = new Set(history.slice(0, 2).map(h => h.number));

    // 5. Score each candidate (higher = more likely next)
    const scores = {};
    for (const n of candidates) {
      const gapW    = maxGap > 0 ? gapOf[n] / maxGap : 0.5;          // 0-1, higher = more overdue
      const coldW   = 1 - (freq[n] / maxFreq);                         // 0-1, higher = colder
      const parityW = (n % 2 === 0) === favorEven ? 0.18 : 0;
      const recPen  = recent2.has(n) ? 0.20 : 0;                       // penalty for just-appeared
      scores[n] = gapW * 0.55 + coldW * 0.28 + parityW - recPen;
    }

    const maxScore = Math.max(...candidates.map(n => scores[n]));

    // 6. Top-tier candidates within 12% of best score → deterministic tiebreak via period seed
    const topTier = candidates.filter(n => scores[n] >= maxScore * 0.88);
    const periodSeed = parseInt(String(history[0]?.period || '0').slice(-3), 10);
    const best = topTier[periodSeed % topTier.length];

  // ── WingoPredictor: streak-based Markov predictor (ported from Python) ──────
  // Builds a stats table: for each {streakLen}_{result} key, counts how often
  // the next round continues (same) vs reverses (different).
  function buildStreakStats(history) {
    const stats = {};
    const reversed = history.slice().reverse(); // oldest → newest
    let streak = 1;
    let prev = null;
    for (let i = 0; i < reversed.length; i++) {
      const result = reversed[i].result;
      if (result === prev) { streak++; } else { streak = 1; }
      prev = result;
      const key = streak + '_' + result;
      if (!stats[key]) stats[key] = { cont: 0, rev: 0 };
      if (i + 1 < reversed.length) {
        if (reversed[i + 1].result === result) { stats[key].cont++; } else { stats[key].rev++; }
      }
    }
    return stats;
  }

  function wingoPredict(history) {
    if (!history.length) return 'BIG';
    const currentResult = history[0].result;
    let streakLen = 1;
    for (let i = 1; i < history.length; i++) {
      if (history[i].result === currentResult) streakLen++; else break;
    }
    const stats = buildStreakStats(history);
    const key = streakLen + '_' + currentResult;
    if (!stats[key]) return currentResult;
    const { cont, rev } = stats[key];
    const total = cont + rev;
    if (total === 0) return currentResult;
    return (cont >= rev) ? currentResult : (currentResult === 'BIG' ? 'SMALL' : 'BIG');

  let fetchInterval = null;

  // ── Self-calibrating server clock ──────────────────────────────────────────
  // Called every time we detect a new result. Learns the server's round grid.
  function calibrateServerClock(period, detectedAt) {
    if (!period || String(period).length < 17) return;
    const rNum = parseInt(String(period).slice(8), 10);
    if (!rNum || isNaN(rNum)) return;
    // Round N ended roughly 300ms before we detected it (network + publish lag)
    const est = (detectedAt - 300) - rNum * 30000;

  }

      if (period.length >= 17) {

        if (rNum && !isNaN(rNum)) {
          const nextRoundEnd = serverMidnightEst + (rNum + 1) * 30000;
          return Math.max(200, nextRoundEnd - Date.now() - EARLY_WINDOW_MS);

      }
    }
    if (!lastRoundTimestamp) return 25000;
    return Math.max(200, lastRoundTimestamp + roundDuration - Date.now() - EARLY_WINDOW_MS);
  }

  // ── Early-result checker — hits the lightweight /api/wingo/early endpoint ──
  // Returns true when a new period is detected so we can trigger a full fetch.
  let isEarlyFetching = false;
  async function checkEarlyResult() {

      if (latestPeriod && liveHistory.length > 0 && latestPeriod !== liveHistory[0].period) {
        return true; // new round detected early
      }
      if (latestPeriod && liveHistory.length === 0) return true;

    } catch(e) { return false; }
    finally { isEarlyFetching = false; }

  // ── Non-blocking poll chain — polls early endpoint at 200ms, then full fetch ─

  }

  function scheduleNextRoundFetch() {

      nextRoundTimer = null;

  async function fetchLiveData() {

    try {
      const res = await fetch('/api/wingo');
      const data = await res.json();
      if (!data.success || !Array.isArray(data.history)) return;

      const existingSet = new Set(liveHistory.map(h => h.period));
      let added = 0;
      for (const item of data.history) {

          existingSet.add(item.period);
          added++;

      if (added > 0) {

        calibrateServerClock(liveHistory[0]?.period, Date.now());
        lastRoundTimestamp = Date.now();
        fastPollActive = false; // stop the fast poll chain
        liveHistory.sort((a, b) => String(b.period).localeCompare(String(a.period)));

          liveHistory = liveHistory.slice(0, 1000);

            const existing = JSON.parse(localStorage.getItem('wingo_bg_v1') || '[]');

            const toAdd = overflow.filter(r => !bgSet.has(r.period));
            const merged = existing.concat(toAdd);
            localStorage.setItem('wingo_bg_v1', JSON.stringify(merged));
          } catch(e) {}
        }
        saveLiveHistory();
        renderLiveTable();
        // Defer prediction to timer=0 if round is still ticking
        const _elapsed   = gameRemainAt ? Date.now() - gameRemainAt : Infinity;
        const _remaining = (gameRemainMs !== null && gameRemainAt !== null) ? Math.max(0, gameRemainMs - _elapsed) : 0;
        if (_remaining > 1500) {

          if (currentPrediction && liveHistory.length > 0) {

  // ── Increment period string by 1 (handles zero-padded numeric suffixes) ──
  function incrementPeriod(period) {
    if (!period || period === '----') return '----';
    const s = String(period);
    // Format: 20260609NNNNNN  (date prefix + sequential number)
    const match = s.match(/^(\d{8})(\d+)$/);
    if (match) {
      const prefix = match[1];
      const numStr = match[2];
      const next = (parseInt(numStr, 10) + 1).toString().padStart(numStr.length, '0');
      return prefix + next;
    }
    // Generic: increment trailing digits
    const m = s.match(/(.*?)(\d+)$/);
    if (m) {
      const next = (parseInt(m[2], 10) + 1).toString().padStart(m[2].length, '0');
      return m[1] + next;
    }
    return s + '+1';
  }

  function renderTimer() {

  async function fetchGameState() {

  async function startAutoSync() {

    if (liveHistory.length > 0) { generateStablePrediction(); updateUIWithCurrentPrediction(); }

    // 4. Bulk-fetch all 500 rounds — awaited so Live Data tab fills immediately
    await fetchBulkHistory();

          }, 1500);
        };
        gameIframe.removeEventListener('load', gameIframe._sessionWatcher);
        gameIframe._sessionWatcher = _onIframeLoad;
        gameIframe.addEventListener('load', _onIframeLoad);

        // Only reload if iframe isn't already on the register/home route
        const currentSrc = gameIframe.src || '';
        if (!currentSrc.includes('hgnice.club') || currentSrc.includes('#/login')) {
          gameIframe.src = 'https://hgnice.club/#/register?invitationCode=513331567606';
        }
      }
    }
  }

  // ── Auto-restore session for returning users (stay Active without re-logging in) ──
  (function _tryRestoreSession() {
    try {
      const raw = localStorage.getItem('wingo_session_v1');
      if (!raw) return;
      const sess = JSON.parse(raw);
      if (!sess || !sess.phone) return;
      // Sessions expire after 7 days
      if (Date.now() - (sess.savedAt || 0) > 7 * 24 * 60 * 60 * 1000) {
        localStorage.removeItem('wingo_session_v1');
        return;
      }
      // If we know the token expiry and it's already passed, don't bother restoring
      if (sess.expiresIn && (sess.expiresIn * 1000) < Date.now()) {
        localStorage.removeItem('wingo_session_v1');
        return;
      }
      // Ping server to verify session is still valid before restoring
      fetch('/api/heartbeat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: sess.phone })
      }).then(r => r.json()).then(d => {
        if (d.ok) {
          _activateMainPanel(sess.phone, false, sess.expiresIn || null);
        } else {
          localStorage.removeItem('wingo_session_v1');
        }
      }).catch(() => {});
    } catch(e) {}
  })();

  async function doUnlock() {
    const username = (document.getElementById('loginUsername').value || '').trim();
    const password = (document.getElementById('loginPassword').value || '').trim();
    if (!username || !password) { shakeWidget(); return; }

    const btn = document.getElementById('unlockBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Verifying...';

    // Pre-fetch 500 rounds in parallel with auth — data loads while credentials verify
    fetchBulkHistory();

    try {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        // Detect if this is a new user or a different account on this device
        let isNewUser = true;
        try {
          const prevSess = JSON.parse(localStorage.getItem('wingo_session_v1') || 'null');
          if (prevSess && prevSess.phone === data.phone) isNewUser = false;
        } catch(e) {}

        // New user or different account — wipe local pred history so they start clean
        if (isNewUser) {
          try {
            localStorage.removeItem('wingo_pred_history_v5');
            predictionHistory = [];
            renderHistoryTable();
          } catch(e) {}
        }

        // Persist session so returning users auto-restore on next page load
        const expiresIn = data.data?.expiresIn || null;
        if (data.phone) {
          try {
            localStorage.setItem('wingo_session_v1', JSON.stringify({
              phone: data.phone,
              savedAt: Date.now(),
              expiresIn: expiresIn
            }));
          } catch(e) {}
        }
        _activateMainPanel(data.phone, isNewUser, expiresIn);
      } else {
        shakeWidget();
        showAuthError(data.msg || 'Invalid credentials');
        btn.disabled = false;
        btn.textContent = '🔒 UNLOCK';
      }
    } catch (e) {
      shakeWidget();
      showAuthError('Connection error — try again');
      btn.disabled = false;
      btn.textContent = '🔒 UNLOCK';
    }
  }

  function shakeWidget() {
    const w = document.getElementById('widget');
    w.style.transition = 'transform 0.07s ease';
    const moves = [6, -6, 5, -5, 3, -3, 0];
    let i = 0;
    const step = () => { w.style.transform = (w._tx ? `translate3d(${w._tx}px,${w._ty||0}px,0) ` : '') + `translateX(${moves[i]}px)`; if (++i < moves.length) setTimeout(step, 70); else w.style.transform = w._tx ? `translate3d(${w._tx}px,${w._ty||0}px,0)` : ''; };
    step();
  }

  async function fetchBalance(phone) {
    try {
      const r = await fetch('/api/balance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone })
      });
      const d = await r.json();
      const el = document.getElementById('balanceDisplay');
      if (!el) return;
      el.style.display = 'inline-block';
      if (d.success && d.balance !== null && d.balance !== undefined) {
        el.textContent = '💰 ৳' + Number(d.balance).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        el.style.color = '#60e080';
        el.style.borderColor = 'rgba(96,224,128,0.3)';
      } else if (d.raw) {
        console.log('[balance raw]', JSON.stringify(d.raw).slice(0, 300));
        // Try to find any numeric-looking field as fallback
        const vals = Object.entries(d.raw).filter(([k,v]) => typeof v === 'number' && v >= 0);
        if (vals.length) {
          el.textContent = '💰 ৳' + Number(vals[0][1]).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        } else { el.textContent = '💰 --'; }
      } else {
        el.style.display = 'none';
      }
    } catch (e) { /* silent */ }
  }

  function showAuthError(msg) {
    let el = document.getElementById('authError');
    if (!el) {
      el = document.createElement('div');
      el.id = 'authError';
      el.style.cssText = 'font-size:11px;color:#ff6060;text-align:center;margin-top:4px;font-weight:600;letter-spacing:0.3px;';
      document.querySelector('.login-area').insertBefore(el, document.getElementById('unlockBtn'));
    }
    el.textContent = msg;
    setTimeout(() => { if (el) el.textContent = ''; }, 3500);
  }

  document.getElementById('unlockBtn').addEventListener('click', doUnlock);
  document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.getElementById('loginPanel').style.display !== 'none') doUnlock(); });
  const eyeToggle = document.getElementById('eyeToggle');
  if (eyeToggle) {

  document.getElementById('refreshAllBtn').addEventListener('click', function() {
    this.textContent = '⏳ Loading…';
    this.disabled = true;
    bulkLoaded = false;
    fetchBulkHistory(true).then(() => {
      this.textContent = '↺ Refresh All';

  document.getElementById('refreshAllBtn').addEventListener('mouseenter', function() {
    if (!this.disabled) { this.style.background = 'rgba(255,150,80,0.22)'; this.style.color = 'rgba(255,220,160,0.95)'; }
  });
  document.getElementById('refreshAllBtn').addEventListener('mouseleave', function() {
    if (!this.disabled) { this.style.background = 'rgba(255,150,80,0.10)'; this.style.color = 'rgba(255,200,140,0.75)'; }
  });

  document.getElementById('exportPdfBtn').addEventListener('click', function() {
    if (!liveHistory.length) { alert('No live data to export yet.'); return; }
    const btn = this;
    btn.textContent = '⏳ Generating…';
    btn.disabled = true;
    setTimeout(() => {
      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const pageW = doc.internal.pageSize.getWidth();
        const pageH = doc.internal.pageSize.getHeight();
        const marginL = 12, marginR = 12, marginT = 18, marginB = 14;
        const usableW = pageW - marginL - marginR;
        const colWidths = [usableW * 0.44, usableW * 0.14, usableW * 0.22, usableW * 0.20];
        const rowH = 7;
        const headerH = 9;
        let y = marginT;

        function drawPageHeader() {
          doc.setFillColor(20, 12, 5);
          doc.rect(0, 0, pageW, 14, 'F');
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(12);
          doc.setTextColor(255, 170, 50);
          doc.text('WINGO · LIVE DATA HISTORY', pageW / 2, 9, { align: 'center' });
          doc.setFontSize(7);
          doc.setTextColor(180, 130, 80);
          const now = new Date().toLocaleString();
          doc.text('Exported: ' + now + '   |   Total Rounds: ' + liveHistory.length, pageW / 2, 13.5, { align: 'center' });
          y = marginT + 4;
        }

        function drawTableHeader() {
          doc.setFillColor(35, 22, 8);
          doc.rect(marginL, y, usableW, headerH, 'F');
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(8);
          doc.setTextColor(255, 190, 80);
          const headers = ['PERIOD', 'NUMBER', 'RESULT', 'PATTERN'];
          let x = marginL + 2;
          headers.forEach((h, i) => {
            doc.text(h, x + (i === 0 ? 0 : colWidths[i] / 2), y + 6, { align: i === 0 ? 'left' : 'center' });
            x += colWidths[i];
          });
          y += headerH;
        }

        drawPageHeader();
        drawTableHeader();

        liveHistory.forEach((row, idx) => {
          if (y + rowH > pageH - marginB) {
            doc.addPage();
            drawPageHeader();
            drawTableHeader();
          }
          const isEven = idx % 2 === 0;
          doc.setFillColor(isEven ? 16 : 22, isEven ? 10 : 14, isEven ? 4 : 6);
          doc.rect(marginL, y, usableW, rowH, 'F');

          doc.setFont('helvetica', 'normal');
          doc.setFontSize(7.5);

          const isBig = row.result === 'BIG';
          let x = marginL + 2;

          doc.setTextColor(200, 180, 140);
          doc.text(String(row.period), x, y + 5, { align: 'left' });
          x += colWidths[0];

          doc.setTextColor(240, 220, 100);
          doc.text(String(row.number), x + colWidths[1] / 2, y + 5, { align: 'center' });
          x += colWidths[1];

          if (isBig) { doc.setTextColor(255, 80, 100); } else { doc.setTextColor(80, 180, 255); }
          doc.setFont('helvetica', 'bold');
          doc.text(row.result, x + colWidths[2] / 2, y + 5, { align: 'center' });
          x += colWidths[2];

          doc.setFont('helvetica', 'normal');
          doc.setTextColor(160, 140, 100);
          const dots = Array.from({length: row.number}, () => isBig ? '●' : '○').join('');
          doc.text(dots.length > 8 ? dots.slice(0,8)+'…' : dots, x + colWidths[3] / 2, y + 5, { align: 'center' });

          y += rowH;
        });

        const totalPages = doc.internal.getNumberOfPages();
        for (let p = 1; p <= totalPages; p++) {
          doc.setPage(p);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(7);
          doc.setTextColor(120, 100, 70);
          doc.text('Page ' + p + ' / ' + totalPages, pageW / 2, pageH - 4, { align: 'center' });
        }

        const dateStr = new Date().toISOString().slice(0,10);
        doc.save('wingo-history-' + dateStr + '.pdf');
      } catch(e) {
        alert('PDF generation failed: ' + e.message);
      }
      btn.textContent = '📄 PDF';
      btn.disabled = false;
    }, 50);
  });
  document.getElementById('exportPdfBtn').addEventListener('mouseenter', function() {
    if (!this.disabled) { this.style.background = 'rgba(100,200,120,0.22)'; this.style.color = 'rgba(160,255,180,0.98)'; }
  });
  document.getElementById('exportPdfBtn').addEventListener('mouseleave', function() {
    if (!this.disabled) { this.style.background = 'rgba(100,200,120,0.10)'; this.style.color = 'rgba(140,230,160,0.85)'; }
  });

  document.getElementById('exportHistoryPdfBtn').addEventListener('click', function() {
    if (!predictionHistory.length) { alert('No prediction history to export yet.'); return; }
    const btn = this;
    btn.textContent = '⏳ Generating…';
    btn.disabled = true;
    setTimeout(() => {
      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const pageW = doc.internal.pageSize.getWidth();
        const pageH = doc.internal.pageSize.getHeight();
        const marginL = 12, marginR = 12, marginT = 18, marginB = 14;
        const usableW = pageW - marginL - marginR;
        const colWidths = [usableW * 0.44, usableW * 0.20, usableW * 0.18, usableW * 0.18];
        const rowH = 7;
        const headerH = 9;
        let y = marginT;

        const correct = predictionHistory.filter(p => p.correct).length;
        const total   = predictionHistory.length;
        const acc     = total ? Math.round((correct / total) * 100) : 0;

        function drawPageHeader() {
          doc.setFillColor(20, 12, 5);
          doc.rect(0, 0, pageW, 14, 'F');
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(12);
          doc.setTextColor(255, 170, 50);
          doc.text('WINGO · PREDICTION HISTORY', pageW / 2, 9, { align: 'center' });
          doc.setFontSize(7);
          doc.setTextColor(180, 130, 80);
          const now = new Date().toLocaleString();
          doc.text('Exported: ' + now + '   |   Total: ' + total + '   ✅ Correct: ' + correct + '   Accuracy: ' + acc + '%', pageW / 2, 13.5, { align: 'center' });
          y = marginT + 4;
        }

        function drawTableHeader() {
          doc.setFillColor(35, 22, 8);
          doc.rect(marginL, y, usableW, headerH, 'F');
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(8);
          doc.setTextColor(255, 190, 80);
          const headers = ['PERIOD', 'PREDICTED', 'NUMBER', 'MATCH'];
          let x = marginL + 2;
          headers.forEach((h, i) => {
            doc.text(h, x + (i === 0 ? 0 : colWidths[i] / 2), y + 6, { align: i === 0 ? 'left' : 'center' });
            x += colWidths[i];
          });
          y += headerH;
        }

        drawPageHeader();
        drawTableHeader();

        predictionHistory.forEach((row, idx) => {
          if (y + rowH > pageH - marginB) {
            doc.addPage();
            drawPageHeader();
            drawTableHeader();
          }
          const isEven = idx % 2 === 0;
          doc.setFillColor(isEven ? 16 : 22, isEven ? 10 : 14, isEven ? 4 : 6);
          doc.rect(marginL, y, usableW, rowH, 'F');
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(7.5);
          let x = marginL + 2;

          doc.setTextColor(200, 180, 140);
          doc.text(String(row.period), x, y + 5, { align: 'left' });
          x += colWidths[0];

          const isBig = row.predictedResult === 'BIG';
          if (isBig) { doc.setTextColor(255, 80, 100); } else { doc.setTextColor(80, 180, 255); }
          doc.setFont('helvetica', 'bold');
          doc.text(row.predictedResult || '---', x + colWidths[1] / 2, y + 5, { align: 'center' });
          x += colWidths[1];

          doc.setFont('helvetica', 'normal');
          doc.setTextColor(240, 220, 100);
          doc.text(row.actualNumber !== undefined ? String(row.actualNumber) : '---', x + colWidths[2] / 2, y + 5, { align: 'center' });
          x += colWidths[2];

          if (row.correct) { doc.setTextColor(80, 220, 120); } else { doc.setTextColor(255, 80, 80); }
          doc.setFont('helvetica', 'bold');
          doc.text(row.correct ? '✓ YES' : '✗ NO', x + colWidths[3] / 2, y + 5, { align: 'center' });

          y += rowH;
        });

        const totalPages = doc.internal.getNumberOfPages();
        for (let p = 1; p <= totalPages; p++) {
          doc.setPage(p);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(7);
          doc.setTextColor(120, 100, 70);
          doc.text('Page ' + p + ' / ' + totalPages, pageW / 2, pageH - 4, { align: 'center' });
        }

        const dateStr = new Date().toISOString().slice(0, 10);
        doc.save('wingo-prediction-history-' + dateStr + '.pdf');
      } catch(e) {
        alert('PDF generation failed: ' + e.message);
      }
      btn.textContent = '📄 PDF';
      btn.disabled = false;
    }, 50);
  });
  document.getElementById('exportHistoryPdfBtn').addEventListener('mouseenter', function() {
    if (!this.disabled) { this.style.background = 'rgba(100,200,120,0.22)'; this.style.color = 'rgba(160,255,180,0.98)'; }
  });
  document.getElementById('exportHistoryPdfBtn').addEventListener('mouseleave', function() {

  });

  document.getElementById('resetHistoryBtn').addEventListener('click', () => {
    predictionHistory = [];
    localStorage.removeItem('wingo_pred_history_v5');
    renderHistoryTable();
    updateHistoryStats();
  });
  document.getElementById('resetHistoryBtn').addEventListener('mouseenter', function() {
    this.style.background = 'rgba(255,80,80,0.13)';
    this.style.color = 'rgba(255,160,140,0.85)';

  document.getElementById('resetHistoryBtn').addEventListener('mouseleave', function() {

  });
  loadLiveHistory();
})();
